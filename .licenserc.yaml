header:
  license:
    spdx-id: AGPL-3.0
    copyright-owner: Daytona Platforms Inc.
    content: |
      Copyright Daytona Platforms Inc.
      SPDX-License-Identifier: AGPL-3.0
    # NOTE: license-eye normalizes headers before matching ("(c)" is expanded to
    # "Copyright", text is lowercased and whitespace-flattened), so the fork-authored
    # "Copyright (c) 2026 Nightona contributors" headers are matched here in their
    # normalized form "Copyright Copyright <year> Nightona contributors".
    # The stamped default (content above) intentionally stays "Daytona Platforms Inc."
    pattern: |
      Copyright ((\d{4} )?Daytona Platforms Inc\.|(Copyright )?\d{4} Nightona contributors)
      SPDX-License-Identifier: AGPL-3\.0
  paths:
    - '**/*.go'
    - '**/*.sh'
    - '**/*.js'
    - '**/*.ts'
    - '**/*.tsx'
    - '**/*.py'

  paths-ignore:
    - 'libs/**'
    - '!libs/computer-use/**'
    - 'apps/api/src/generate-openapi.ts'
    - 'apps/runner/pkg/api/docs/docs.go'
    - 'examples/**'
    - 'apps/docs/**'
    - 'hack/**'
    - 'guides/**'
    - 'apps/daemon/pkg/toolbox/docs/docs.go'
    - 'apps/dashboard/public/mockServiceWorker.js'

  comment: on-failure
