header:
  license:
    spdx-id: Apache-2.0
    copyright-owner: Daytona Platforms Inc.
    content: |
      Copyright Daytona Platforms Inc.
      SPDX-License-Identifier: Apache-2.0
    # NOTE: license-eye normalizes headers before matching ("(c)" is expanded to
    # "Copyright", text is lowercased and whitespace-flattened), so the fork-authored
    # "Copyright (c) 2026 Nightona contributors" headers are matched here in their
    # normalized form "Copyright Copyright <year> Nightona contributors".
    # The stamped default (content above) intentionally stays "Daytona Platforms Inc."
    pattern: |
      Copyright ((\d{4} )?Daytona Platforms Inc\.|(Copyright )?\d{4} Nightona contributors)
      SPDX-License-Identifier: Apache-2\.0
  paths:
    - 'libs/**/*.go'
    - 'libs/**/*.sh'
    - 'libs/**/*.js'
    - 'libs/**/*.ts'
    - 'libs/**/*.tsx'
    - 'libs/**/*.py'
    - 'libs/**/*.rb'
    - 'libs/**/*.java'
    - 'guides/**/*.py'
    - 'guides/**/*.ts'
    - 'guides/**/*.go'
    - 'guides/**/*.js'

  paths-ignore:
    - 'libs/analytics-api-client/**'
    - 'libs/billing-api-client/**'
    - 'libs/api-client/**'
    - 'libs/runner-api-client/**'
    - 'libs/api-client-go/**'
    - 'libs/api-client-python/**'
    - 'libs/api-client-python-async/**'
    - 'libs/api-client-ruby/**'
    - 'apps/docs/**'
    - 'libs/computer-use/**'
    - 'hack/**'
    - 'libs/toolbox-api-client/**'
    - 'libs/toolbox-api-client-python/**'
    - 'libs/toolbox-api-client-python-async/**'
    - 'libs/toolbox-api-client-ruby/**'
    - 'libs/toolbox-api-client-go/**'
    - 'libs/api-client-java/**'
    - 'libs/toolbox-api-client-java/**'

  comment: on-failure
