self-hosted-runner:
  labels:
    # All jobs run on GitHub-hosted runners (ubuntu-latest, ubuntu-24.04-arm).
    # ubuntu-latest is always recognized by actionlint; ubuntu-24.04-arm is
    # only known to actionlint >= 1.7.7, so it is whitelisted here for
    # compatibility with older actionlint versions.
    - ubuntu-24.04-arm
